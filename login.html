<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Viabix Sistema Industrial</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a3d2e 0%, #2e7d32 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-header {
            background: linear-gradient(135deg, #0a3d2e 0%, #1b5e20 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .login-header i {
            font-size: 4rem;
            margin-bottom: 15px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }
        
        .login-header h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        
        .login-header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .login-body {
            padding: 40px 30px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 1.1rem;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: 0.3s;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #2e7d32;
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1);
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(46, 125, 50, 0.3);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.3s ease-out;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .alert-error {
            background: #ffebee;
            border: 1px solid #ef5350;
            color: #c62828;
        }
        
        .alert-success {
            background: #e8f5e9;
            border: 1px solid #66bb6a;
            color: #2e7d32;
        }
        
        .login-footer {
            background: #f5f5f5;
            padding: 20px;
            text-align: center;
            color: #666;
            font-size: 0.85rem;
        }

        .signup-cta {
            margin-top: 22px;
            padding-top: 18px;
            border-top: 1px solid #e6e6e6;
            text-align: center;
        }

        .signup-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #1b5e20;
            font-weight: 700;
            padding: 12px 16px;
            border-radius: 12px;
            background: #eef7ef;
            transition: 0.2s;
        }

        .signup-link:hover {
            background: #e2f1e3;
            transform: translateY(-1px);
        }

        .public-site-link {
            margin-top: 12px;
            display: inline-block;
            color: #4b5c54;
            font-weight: 600;
            text-decoration: none;
        }

        .public-site-link:hover {
            color: #1b5e20;
        }
        
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading .spinner {
            display: inline-block;
        }
        
        .loading .btn-text {
            display: none;
        }
        
        @media (max-width: 480px) {
            .login-header h1 {
                font-size: 1.5rem;
            }
            
            .login-body {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <i class="fas fa-industry"></i>
            <h1>Viabix</h1>
            <p>Sistema Industrial Completo</p>
        </div>
        
        <div class="login-body">
            <div id="alert" class="alert"></div>
            
            <form id="loginForm" onsubmit="fazerLogin(event)">
                <div class="form-group">
                    <label for="login">Usuário</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input 
                            type="text" 
                            id="login" 
                            class="form-control" 
                            placeholder="Digite seu usuário"
                            required
                            autocomplete="username"
                            autofocus
                        >
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input 
                            type="password" 
                            id="senha" 
                            class="form-control" 
                            placeholder="Digite sua senha"
                            required
                            autocomplete="current-password"
                        >
                    </div>
                </div>
                
                <button type="submit" id="btnLogin" class="btn-login">
                    <div class="spinner"></div>
                    <span class="btn-text">
                        <i class="fas fa-sign-in-alt"></i>
                        Entrar no Sistema
                    </span>
                </button>
            </form>

            <div class="signup-cta">
                <p style="margin-bottom: 12px; color: #666;">Ainda não tem conta?</p>
                <a href="signup.html" class="signup-link">
                    <i class="fas fa-rocket"></i>
                    Criar teste grátis
                </a>
                <div>
                    <a href="index.html?from=login" id="publicSiteLink" class="public-site-link">Ver planos e informações do produto</a>
                </div>
            </div>
        </div>
        
        <div class="login-footer">
            <p>
                <i class="fas fa-shield-alt"></i> Sistema Seguro com Criptografia
            </p>
            <p style="margin-top: 10px; font-size: 0.8rem;">
                Viabix - Análise de Viabilidade Industrial + Controle de Projetos
            </p>
        </div>
    </div>
    
    <script>
        function mostrarAlerta(mensagem, tipo = 'error') {
            const alert = document.getElementById('alert');
            alert.className = `alert alert-${tipo}`;
            alert.innerHTML = `<i class="fas fa-${tipo === 'error' ? 'exclamation-circle' : 'check-circle'}"></i> ${mensagem}`;
            alert.style.display = 'block';
            
            if (tipo === 'success') {
                setTimeout(() => {
                    alert.style.display = 'none';
                }, 2000);
            }
        }
        
        async function fazerLogin(event) {
            event.preventDefault();
            
            const login = document.getElementById('login').value.trim();
            const senha = document.getElementById('senha').value.trim();
            const btnLogin = document.getElementById('btnLogin');
            const alert = document.getElementById('alert');
            
            // Esconder alerta anterior
            alert.style.display = 'none';
            
            // Desabilitar botão e mostrar loading
            btnLogin.disabled = true;
            btnLogin.classList.add('loading');
            
            try {
                const response = await fetch('api/login.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ login, senha })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    mostrarAlerta('Login realizado com sucesso! Redirecionando...', 'success');
                    
                    // Redirecionar para o dashboard após 1 segundo
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    mostrarAlerta(data.message || 'Erro ao fazer login', 'error');
                    btnLogin.disabled = false;
                    btnLogin.classList.remove('loading');
                }
            } catch (error) {
                console.error('Erro:', error);
                mostrarAlerta('Erro de conexão com o servidor', 'error');
                btnLogin.disabled = false;
                btnLogin.classList.remove('loading');
            }
        }
        
        // Verificar se já está logado
        async function verificarSessao() {
            try {
                const response = await fetch('api/check_session.php', {
                    credentials: 'include'
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.logado) {
                        // Já está logado, redirecionar
                        window.location.href = 'dashboard.html';
                    }
                }
            } catch (e) {
                // Não faz nada, usuário não está logado
            }
        }
        
        // Verificar ao carregar a página
        verificarSessao();

        const publicSiteLink = document.getElementById('publicSiteLink');
        if (publicSiteLink) {
            publicSiteLink.addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'index.html?from=login';
            });
        }
        
        // Enter para fazer login
        document.addEventListener('keydown', function(e) {
            const activeElement = document.activeElement;
            const isLoginField = activeElement && (activeElement.id === 'login' || activeElement.id === 'senha');

            if (e.key === 'Enter' && isLoginField && !document.getElementById('btnLogin').disabled) {
                e.preventDefault();
                document.getElementById('loginForm').dispatchEvent(new Event('submit', { cancelable: true }));
            }
        });
    </script>
</body>
</html>
