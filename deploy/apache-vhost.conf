<VirtualHost *:80>
    ServerName app.seudominio.com
    ServerAlias www.app.seudominio.com
    DocumentRoot /var/www/viabix

    <Directory /var/www/viabix>
        AllowOverride All
        Require all granted
        Options FollowSymLinks
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/viabix_error.log
    CustomLog ${APACHE_LOG_DIR}/viabix_access.log combined

    RewriteEngine On
    RewriteCond %{HTTPS} !=on
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [R=301,L]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName app.seudominio.com
    ServerAlias www.app.seudominio.com
    DocumentRoot /var/www/viabix

    <Directory /var/www/viabix>
        AllowOverride All
        Require all granted
        Options FollowSymLinks
    </Directory>

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/app.seudominio.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/app.seudominio.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    Header always set X-Frame-Options SAMEORIGIN
    Header always set X-Content-Type-Options nosniff
    Header always set Referrer-Policy strict-origin-when-cross-origin

    ErrorLog ${APACHE_LOG_DIR}/viabix_ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/viabix_ssl_access.log combined
</VirtualHost>
</IfModule>