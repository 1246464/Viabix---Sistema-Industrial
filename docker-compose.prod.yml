version: '3.8'

################################################################################################
# VIABIX DOCKER COMPOSE - Production Ready
# 
# 🐳 Usar este arquivo para rápido deploy em DigitalOcean App Platform
# 
# USO:
#   docker-compose -f docker-compose.prod.yml up -d
#
# Docker Hub Images:
#   - php:8.2-apache    (Official PHP 8.2 com Apache pré-configurado)
#   - mysql:8.0         (Official MySQL 8.0)
#   - redis:7-alpine    (Official Redis 7)
#
################################################################################################

services:
  
  # ============================================================================
  # APACHE + PHP 8.2
  # ============================================================================
  app:
    image: php:8.2-apache
    container_name: viabix-app
    
    # Port bindings
    ports:
      - "80:80"
      - "443:443"
    
    # Volume mounts
    volumes:
      # Application code
      - ./:/var/www/html
      
      # Custom PHP configuration
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      
      # Apache configuration
      - ./docker/apache/viabix.conf:/etc/apache2/sites-available/viabix.conf:ro
      
      # SSL certificates (mapeie do Droplet ou Let's Encrypt)
      - /etc/letsencrypt/:/etc/letsencrypt:ro
      
      # Logs
      - ./logs/apache:/var/log/apache2
      - ./logs/php:/var/log/php
    
    # Environment variables
    environment:
      PHP_ENV: production
      MYSQL_HOST: ${DB_HOST:-db}
      MYSQL_PORT: ${DB_PORT:-3306}
      MYSQL_DATABASE: ${DB_NAME:-viabix_prod}
      MYSQL_USER: ${DB_USER:-viabix_app}
      MYSQL_PASSWORD: ${DB_PASS}
      
      # Redis
      REDIS_HOST: ${CACHE_HOST:-cache}
      REDIS_PORT: ${CACHE_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      
      # Sentry
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_ENVIRONMENT: production
    
    # Dependencies
    depends_on:
      - db
      - cache
    
    # Restart policy
    restart: unless-stopped
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s


  # ============================================================================
  # MYSQL 8.0 DATABASE
  # ============================================================================
  db:
    image: mysql:8.0
    container_name: viabix-mysql
    
    # Environment
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-viabix_prod}
      MYSQL_USER: ${DB_USER:-viabix_app}
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_INITDB_SKIP_TZINFO: 1
    
    # Volumes
    volumes:
      # Database data persistence
      - db_data:/var/lib/mysql
      
      # Initial schema
      - ./BD/viabix_saas_multitenant.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      
      # MySQL configuration
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
      
      # Logs
      - ./logs/mysql:/var/log/mysql
    
    # Ports
    ports:
      - "3306:3306"
    
    # Restart policy
    restart: unless-stopped
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    
    # Health check
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5


  # ============================================================================
  # REDIS 7 - Cache & Sessions
  # ============================================================================
  cache:
    image: redis:7-alpine
    container_name: viabix-redis
    
    # Command (com password)
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    
    # Volumes
    volumes:
      # Redis data persistence
      - redis_data:/data
    
    # Ports
    ports:
      - "6379:6379"
    
    # Restart policy
    restart: unless-stopped
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 128M
    
    # Health check
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5


  # ============================================================================
  # NGINX REVERSE PROXY (Optional - para load balancing)
  # ============================================================================
  # Descomentar se precisar de reverse proxy / SSL termination
  #
  # proxy:
  #   image: nginx:alpine
  #   container_name: viabix-nginx
  #   
  #   volumes:
  #     - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./docker/nginx/viabix.conf:/etc/nginx/conf.d/default.conf:ro
  #     - /etc/letsencrypt:/etc/letsencrypt:ro
  #   
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   
  #   depends_on:
  #     - app
  #   
  #   restart: unless-stopped


  # ============================================================================
  # BACKUP SERVICE (Cronjob)
  # ============================================================================
  # Descomentar para automated backups
  #
  # backup:
  #   image: viabix/backup:latest
  #   container_name: viabix-backup
  #   
  #   volumes:
  #     - ./BD:/backups
  #     - ./docker-entrypoint-backup.sh:/entrypoint.sh:ro
  #   
  #   environment:
  #     MYSQL_HOST: db
  #     MYSQL_USER: ${DB_USER}
  #     MYSQL_PASSWORD: ${DB_PASS}
  #     S3_BUCKET: viabix-backups
  #     AWS_ACCESS_KEY_ID: ${BACKUP_S3_KEY}
  #     AWS_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET}
  #   
  #   depends_on:
  #     - db
  #   
  #   restart: unless-stopped


################################################################################################
# VOLUMES - Persistent Data
################################################################################################

volumes:
  db_data:
    driver: local
  
  redis_data:
    driver: local


################################################################################################
# NETWORKS
################################################################################################

networks:
  default:
    name: viabix-network
    driver: bridge


################################################################################################
# INSTRUCTIONS
#
# 1. CRIAR .env FILE:
#    cp .env.production .env
#    
# 2. PREENCHER VALORES SENSÍVEIS:
#    nano .env
#    - DB_PASS
#    - DB_ROOT_PASSWORD
#    - REDIS_PASSWORD
#    - SENTRY_DSN
#    - etc...
#
# 3. CRIAR DIRETÓRIOS DE LOG:
#    mkdir -p logs/apache logs/mysql logs/php
#
# 4. INICIAR CONTAINERS:
#    docker-compose -f docker-compose.prod.yml up -d
#
# 5. VERIFICAR STATUS:
#    docker-compose ps
#    docker-compose logs -f app
#
# 6. TESTE:
#    curl http://localhost/api/healthcheck
#
# 7. IMPORTER BACKUP (se necessário):
#    docker exec -i viabix-mysql mysql -u viabix_app -p viabix_prod < backup.sql
#
################################################################################################
